name: Process Geo Files

on:
  schedule:
    # 7 AM Beijing time (UTC+8) = 23:00 UTC (previous day)
    - cron: "0 23 * * *"
  workflow_dispatch: # Allow manual triggering

jobs:
  process-geo:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create/update releases

    steps:
      - name: Set variables
        run: |
          echo "RELEASE_NAME=Released on $(date +%Y%m%d%H%M)" >> $GITHUB_ENV
          echo "TAG_NAME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
        shell: bash

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history and tags

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -o process-geo ./main.go

      - name: Run process-geo
        run: ./process-geo

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          release_name: ${{ env.RELEASE_NAME }}
          tag_name: ${{ env.TAG_NAME }}
          files: |
            simplified_geosite.dat
            simplified_geoip.dat
            simplified_geosite_ru.dat
          draft: false
          prerelease: false
          generate_release_notes: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Git push assets to "release" branch
        run: |
          mkdir -p release
          cp simplified_geosite.dat simplified_geoip.dat simplified_geosite_ru.dat release/
          cd release || exit 1
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add .
          git commit -m "${{ env.RELEASE_NAME }}"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f -u origin release

      - name: Purge jsdelivr CDN
        run: |
          cd release || exit 1
          for file in $(ls); do
            curl -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/${file}"
          done

      - name: Delete releases older than 7 days
        uses: actions/github-script@v7
        env:
          CURRENT_TAG: ${{ env.TAG_NAME }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const daysToKeep = 7;
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - daysToKeep);
            const currentTag = process.env.CURRENT_TAG;

            // List all releases (paginated)
            const allReleases = await github.paginate(
              github.rest.repos.listReleases,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              }
            );

            // Operate only on published stable releases
            const releases = allReleases
              .filter((rel) => !rel.draft && !rel.prerelease)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            // Extra safety: always keep the newest stable release
            const newestReleaseId = releases[0]?.id;

            for (const rel of releases) {
              const created = new Date(rel.created_at);

              // Never delete the newest release, or the current run's tag
              if (rel.id === newestReleaseId) continue;
              if (currentTag && rel.tag_name === currentTag) continue;

              if (created < cutoff) {
                core.info(`Deleting release ${rel.id} (${rel.tag_name}) created at ${rel.created_at}`);

                // Delete release
                await github.rest.repos.deleteRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: rel.id,
                });

                // Delete the tag if it exists
                try {
                  await github.rest.git.deleteRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: `tags/${rel.tag_name}`,
                  });
                } catch (e) {
                  core.warning(`Could not delete tag ${rel.tag_name}: ${e.message}`);
                }
              }
            }
